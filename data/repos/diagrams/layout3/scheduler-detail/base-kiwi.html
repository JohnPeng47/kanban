<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React Scheduler — Interactive Diagram</title>
  <style>
    body { margin: 0; padding: 0; background: #1F2428; overflow: hidden; height: 100vh; }

    #diagram-container {
      width: 100vw; height: 100vh;
      cursor: grab;
    }
    #diagram-container.panning { cursor: grabbing; }

    svg { display: block; width: 100%; height: 100%; }

    /* Clickable elements take priority over pan */
    .clickable { cursor: pointer; transition: filter 0.15s ease; }
    .clickable:hover { filter: brightness(1.5) drop-shadow(0 0 6px currentColor); }

    /* Expandable seams */
    [data-expandable] .collapsed-content { cursor: pointer; }
    [data-expandable] .collapsed-content:hover > rect:first-child {
      filter: brightness(1.3) drop-shadow(0 0 8px rgba(210, 153, 34, 0.4));
    }

    /* Smooth transforms for expansion displacement */
    [data-node-id], [data-arrow] {
      transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .expanded-content { opacity: 0; transition: opacity 0.35s ease 0.1s; }
    .expanded-content.visible { opacity: 1; }
    .collapsed-content { transition: opacity 0.2s ease; }
    .collapsed-content.hidden { opacity: 0; pointer-events: none; }

    /* Tooltip */
    #tooltip {
      position: fixed; pointer-events: none;
      background: #2D3339; color: #E6EDF3;
      font-family: 'JetBrains Mono','Fira Code','SF Mono',monospace;
      font-size: 11px; padding: 6px 10px; border-radius: 6px;
      border: 1px solid #444C56; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.15s ease; z-index: 100;
      max-width: 420px; white-space: nowrap;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-file { color: #4C9AFF; }
    #tooltip .tt-hint { color: #6E7681; font-size: 10px; margin-top: 2px; }
    #tooltip .tt-action { color: #D29922; font-size: 10px; margin-top: 3px; }

    /* Ripple */
    .ripple {
      position: fixed; width: 20px; height: 20px; border-radius: 50%;
      background: rgba(76,154,255,0.4); pointer-events: none;
      animation: ripple-out 0.5s ease-out forwards;
    }
    @keyframes ripple-out {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
    }

    /* Zoom controls */
    #controls {
      position: fixed; bottom: 20px; right: 20px; display: flex; gap: 6px; z-index: 50;
    }
    #controls button {
      width: 36px; height: 36px; border: 1px solid #444C56; border-radius: 6px;
      background: #2D3339; color: #E6EDF3; font-size: 16px; cursor: pointer;
      font-family: monospace; display: flex; align-items: center; justify-content: center;
    }
    #controls button:hover { background: #3D4349; }
  </style>
  <script src="https://unpkg.com/kiwi.js@1.1.3/dist/kiwi.js"></script>
</head>
<body>

<div id="tooltip"></div>

<div id="controls">
  <button onclick="zoomIn()" title="Zoom in">+</button>
  <button onclick="zoomOut()" title="Zoom out">-</button>
  <button onclick="resetView()" title="Reset view">R</button>
</div>

<div id="diagram-container">
<svg id="diagram" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1400"
  font-family="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code','Consolas',monospace" font-size="11">
  <style>
    text { fill: #8B949E; }
    .white { fill: #E6EDF3; }
    .blue { fill: #4C9AFF; }
    .green { fill: #3FB950; }
    .violet { fill: #A371F7; }
    .orange { fill: #D29922; }
    .red { fill: #F85149; }
    .dim { fill: #6E7681; }
    .title { font-size: 14px; font-weight: 600; }
    .heading { font-size: 13px; font-weight: 600; }
    .subhead { font-size: 10px; }
    .flow-dash { stroke-dasharray: 6,4; animation: dash-flow 1.5s linear infinite; }
    @keyframes dash-flow { to { stroke-dashoffset: -20; } }
    .box-glow { transition: filter 0.2s ease; }
    .box-glow:hover { filter: drop-shadow(0 0 8px rgba(76,154,255,0.3)); }
    .pulse { animation: pulse-glow 2s ease-in-out infinite; }
    @keyframes pulse-glow { 0%,100% { opacity: 0.4; r: 3; } 50% { opacity: 1; r: 5; } }
    .fade-section { opacity: 0; animation: fade-up 0.6s ease forwards; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#8B949E" stroke-width="1"/>
    </marker>
    <marker id="ab" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4C9AFF" stroke-width="1"/>
    </marker>
    <marker id="ao" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#D29922" stroke-width="1"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#3FB950" stroke-width="1"/>
    </marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#F85149" stroke-width="1"/>
    </marker>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4C9AFF" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3FB950" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>

    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">

      <feFlood flood-color="#D29922" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>

  </defs>

  <!-- Background rect for pan target -->
  <rect x="-5000" y="-5000" width="11000" height="11000" fill="#1F2428"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Title                                       -->
  <!-- ═══════════════════════════════════════════ -->
  <g class="fade-section" style="animation-delay: 0s">
    <text x="20" y="28" class="white title">REACT SCHEDULER</text>

    <text x="57" y="412" class="dim subhead">ready tasks, sorted by expirationTime</text>
    <text x="57" y="426" class="dim subhead" font-size="9">[ Immed(100) | UserBlk(350) | Normal(5100) | Idle(MAX) ]</text>

    <!-- timerQueue -->
    <rect x="580" y="378" width="400" height="55" rx="3" fill="#2D3339" stroke="#4C9AFF" stroke-width="0.6"/>
    <text x="592" y="396" class="blue clickable"
      onclick="nav('packages/scheduler/src/forks/Scheduler.js', 54)"
      data-tt="Scheduler.js:54 — var timerQueue = []">timerQueue (min-heap)</text>
    <text x="592" y="412" class="dim subhead">delayed tasks, sorted by startTime</text>

    <line x1="580" y1="405" x2="445" y2="405" stroke="#4C9AFF" stroke-width="1" class="flow-dash" marker-end="url(#ab)"/>

    <rect x="23" y="599" width="1054" height="274" rx="3" fill="none" stroke="#D29922" stroke-width="0.5"/>

    <text x="32" y="636" class="white clickable"
      onclick="nav('packages/scheduler/src/forks/Scheduler.js', 410)"
      data-tt="Scheduler.js:410 — while (currentTask !== null)">while (currentTask !== null) {</text>

        onclick="nav('packages/scheduler/src/forks/Scheduler.js', 480)"

      <text x="62" y="682" class="clickable"
        onclick="nav('packages/scheduler/src/forks/Scheduler.js', 485)"
        data-tt="Scheduler.js:485 — expired tasks skip yield check">expired (expirationTime &lt;= now)?  → skip check, run immediately</text>
      <text x="62" y="698" class="clickable"
        onclick="nav('packages/scheduler/src/SchedulerFeatureFlags.js', 12)"
        data-tt="SchedulerFeatureFlags.js:12 — frameYieldMs = 5">elapsed &gt;= 5ms? → yield        needsPaint? → yield</text>
    </g>

    <line x1="400" y1="716" x2="400" y2="745" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="410" y="734" class="dim subhead">pass</text>

    <line x1="500" y1="908" x2="340" y2="922" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>

  <!-- MORE WORK / NO MORE WORK -->
  <g data-node-id="more-work" class="fade-section" style="animation-delay: 0.55s">
    <rect x="200" y="925" width="240" height="40" rx="3" fill="#24292E" stroke="#3FB950" stroke-width="0.8"/>

    <text x="572" y="943" class="violet">no more work</text>
    <text x="572" y="957" class="dim subhead">loop stops</text>
  </g>

  <!-- Arrow: more work → browser time -->
  <g data-arrow="true" class="fade-section" style="animation-delay: 0.6s">
    <line x1="320" y1="965" x2="320" y2="1005" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BROWSER TIME                                -->
  <!-- ═══════════════════════════════════════════ -->
  <g data-node-id="browser-time" class="fade-section" style="animation-delay: 0.65s">
    <rect x="20" y="1010" width="1060" height="36" rx="4" fill="#24292E" stroke="#3FB950" stroke-width="1.2"/>
    <rect x="22" y="1012" width="1056" height="32" rx="3" fill="none" stroke="#3FB950" stroke-width="0.4"/>
    <text x="550" y="1033" text-anchor="middle" class="green">BROWSER TIME     style recalc → layout → paint → handle input → rAF</text>
  </g>

  <!-- Arrow: browser time → annotation -->
  <g data-arrow="true" class="fade-section" style="animation-delay: 0.7s">
    <line x1="550" y1="1046" x2="550" y2="1068" stroke="#8B949E" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SEPARATOR                                   -->
  <!-- ═══════════════════════════════════════════ -->

    <line x1="20" y1="1108" x2="1080" y2="1108" stroke="#444C56" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CONTINUATION PATTERN (left, expandable)     -->
  <!-- ═══════════════════════════════════════════ -->
  <g data-node-id="continuation-pattern" data-expandable="true" data-expand-src="continuation.html" data-expand-w="520" data-expand-h="440"
     class="fade-section" style="animation-delay: 0.8s">
    <g class="collapsed-content">
      <rect x="20" y="1122" width="520" height="170" rx="4" fill="#24292E" stroke="#D29922" stroke-width="1" filter="url(#glow-orange)"/>
      <text x="32" y="1142" class="orange heading">► 07-continuation-pattern</text>
      <text x="430" y="1142" class="dim subhead">[expand]</text>
      <text x="32" y="1162" class="dim">One render, many time slices:</text>

      <text x="52" y="1190" class="orange" font-size="10">slice 1</text>
      <text x="52" y="1206" class="dim subhead">return self</text>

      <rect x="158" y="1172" width="90" height="44" rx="3" fill="#2D3339" stroke="#D29922" stroke-width="0.6"/>
      <text x="168" y="1190" class="orange" font-size="10">slice 2</text>
      <text x="168" y="1206" class="dim subhead">return self</text>

      <rect x="274" y="1172" width="90" height="44" rx="3" fill="#2D3339" stroke="#D29922" stroke-width="0.6"/>
      <text x="284" y="1190" class="orange" font-size="10">slice 3</text>
      <text x="284" y="1206" class="dim subhead">return null</text>

      <line x1="132" y1="1194" x2="158" y2="1194" stroke="#D29922" stroke-width="1" marker-end="url(#ao)"/>
      <line x1="248" y1="1194" x2="274" y2="1194" stroke="#D29922" stroke-width="1" marker-end="url(#ao)"/>
      <line x1="364" y1="1194" x2="400" y2="1194" stroke="#3FB950" stroke-width="1" marker-end="url(#ag)"/>
      <text x="406" y="1198" class="green" font-size="10">commit</text>

      <text x="62" y="1236" class="green subhead">[browser]</text>
      <text x="178" y="1236" class="green subhead">[browser]</text>

      <text x="32" y="1262" class="dim subhead">task.callback updated each time, task stays in heap until null returned</text>
    </g>
    <g class="expanded-content"></g>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PREEMPTION (right, expandable)              -->
  <!-- ═══════════════════════════════════════════ -->
  <g data-node-id="preemption" data-expandable="true" data-expand-src="preemption.html" data-expand-w="530" data-expand-h="520"
     class="fade-section" style="animation-delay: 0.85s">
    <g class="collapsed-content">
      <rect x="560" y="1122" width="520" height="170" rx="4" fill="#24292E" stroke="#D29922" stroke-width="1" filter="url(#glow-orange)"/>
      <text x="572" y="1142" class="orange heading">► 08-preemption</text>
      <text x="970" y="1142" class="dim subhead">[expand]</text>
      <text x="572" y="1162">Transition rendering ─── user clicks ─── click task</text>
      <text x="572" y="1177" class="dim subhead">(Normal, idx=5100)                    (Immediate, idx=100)</text>
      <text x="582" y="1198" class="dim">shouldYield() → true, returns continuation</text>
      <text x="572" y="1218" class="white">heap: [click(100), transition(5100)]</text>
      <text x="582" y="1236" class="dim">├──► click runs to completion, commits</text>
      <text x="582" y="1251" class="dim">└──► transition resumes, tree stale → restart</text>
      <text x="572" y="1280" class="red subhead" font-style="italic">Render must be side-effect-free.</text>
    </g>
    <g class="expanded-content"></g>
  </g>

</svg>
</div>

<script>
// ═══════════════════════════════════════════
// Navigation API
// ═══════════════════════════════════════════
const NAV_PORT = new URLSearchParams(location.search).get('port') || '24680';
const NAV_BASE = `http://localhost:${NAV_PORT}`;
let didPan = false;

function nav(filePath, line) {
  if (didPan) { didPan = false; return; }

  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (event.clientX - 10) + 'px';
  ripple.style.top = (event.clientY - 10) + 'px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  fetch(`${NAV_BASE}/api/navigate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filePath, line: line || undefined }),
  }).catch(() => {});
}

// ═══════════════════════════════════════════
// Tooltip system
// ═══════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
document.addEventListener('mouseover', (e) => {
  const target = e.target.closest('[data-tt]');
  if (!target) { tooltip.classList.remove('visible'); return; }
  const tt = target.getAttribute('data-tt');
  const parts = tt.split(' — ');
  tooltip.innerHTML = `<span class="tt-file">${parts[0]}</span>${parts[1] ? `<div class="tt-hint">${parts[1]}</div>` : ''}<div class="tt-action">click to jump to code</div>`;
  tooltip.classList.add('visible');
});
document.addEventListener('mousemove', (e) => {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});
document.addEventListener('mouseout', (e) => {
  if (!e.target.closest('[data-tt]')) tooltip.classList.remove('visible');
});

// ═══════════════════════════════════════════
// Pan / Zoom
// ═══════════════════════════════════════════
const svg = document.getElementById('diagram');
const container = document.getElementById('diagram-container');
let vb = { x: 0, y: 0, w: 1100, h: 1400 };
let mouseDownPos = null;
let startVb = null;
const PAN_THRESHOLD = 4;
const ZOOM_FACTOR = 0.08;
const MIN_ZOOM = 200;
const MAX_ZOOM = 8000;

function applyViewBox() {
  svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
}

container.addEventListener('mousedown', (e) => {
  mouseDownPos = { x: e.clientX, y: e.clientY };
  startVb = { ...vb };
  didPan = false;
});

window.addEventListener('mousemove', (e) => {
  if (!mouseDownPos) return;
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.abs(dx) > PAN_THRESHOLD || Math.abs(dy) > PAN_THRESHOLD) {
    didPan = true;
    container.classList.add('panning');
    const scale = vb.w / svg.clientWidth;
    vb.x = startVb.x - dx * scale;
    vb.y = startVb.y - dy * scale;
    applyViewBox();
  }
});

window.addEventListener('mouseup', () => {
  mouseDownPos = null;
  container.classList.remove('panning');
});

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const direction = e.deltaY > 0 ? 1 : -1;
  const factor = 1 + direction * ZOOM_FACTOR;
  const newW = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, vb.w * factor));
  const newH = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, vb.h * factor));

  // Zoom toward cursor
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;
  vb.x += (vb.w - newW) * mx;
  vb.y += (vb.h - newH) * my;
  vb.w = newW;
  vb.h = newH;
  applyViewBox();
}, { passive: false });

function zoomIn() {
  const newW = vb.w * 0.8, newH = vb.h * 0.8;
  vb.x += (vb.w - newW) * 0.5;
  vb.y += (vb.h - newH) * 0.5;
  vb.w = newW; vb.h = newH;
  applyViewBox();
}
function zoomOut() {
  const newW = vb.w * 1.25, newH = vb.h * 1.25;
  vb.x += (vb.w - newW) * 0.5;
  vb.y += (vb.h - newH) * 0.5;
  vb.w = newW; vb.h = newH;
  applyViewBox();
}
function resetView() {
  vb = { x: 0, y: 0, w: 1100, h: 1400 };
  applyViewBox();
}

// ═══════════════════════════════════════════
// Expandable node system (kiwi.js constraint solver)
// ═══════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
const originalBounds = {};
const expandedState = {};
const fetchCache = {};

// Kiwi solver state
let solver = null;
const nodeVars = {};   // nodeId → { y: Variable }
const arrowVars = {};  // arrowIdx → { y: Variable }
const heightEdits = {}; // nodeId → { edit: Variable, constraint: Constraint }

// Gap between vertically adjacent elements (px in SVG coords)
const GAP = 6;

function cacheBounds() {
  svg.querySelectorAll('[data-node-id]').forEach(el => {
    const id = el.dataset.nodeId;
    const bbox = el.getBBox();
    originalBounds[id] = { x: bbox.x, y: bbox.y, w: bbox.width, h: bbox.height };
  });
  svg.querySelectorAll('[data-arrow]').forEach((el, i) => {
    el.dataset.arrowIdx = i;
    const bbox = el.getBBox();
    originalBounds['arrow-' + i] = { x: bbox.x, y: bbox.y, w: bbox.width, h: bbox.height };
  });
}

function buildSolver() {
  const { Solver, Variable, Constraint, Operator, Strength } = kiwi;
  solver = new Solver();

  // Collect all elements sorted by their original top-Y position.
  // This gives us the vertical ordering for constraints.
  const allElements = [];

  svg.querySelectorAll('[data-node-id]').forEach(el => {
    const id = el.dataset.nodeId;
    const b = originalBounds[id];
    if (!b) return;
    const yVar = new Variable(`node_${id}_y`);
    const hVar = new Variable(`node_${id}_h`);
    nodeVars[id] = { y: yVar, h: hVar };
    // Y position: prefer original position (STRONG)
    solver.addConstraint(new Constraint(yVar, Operator.Eq, b.y, Strength.strong));
    // Height: starts at collapsed height (STRONG, will be edited on expand)
    solver.addConstraint(new Constraint(hVar, Operator.Eq, b.h, Strength.strong));
    allElements.push({ key: id, type: 'node', y: b.y, h: b.h, yVar, hVar });
  });

  svg.querySelectorAll('[data-arrow]').forEach(el => {
    const idx = el.dataset.arrowIdx;
    const b = originalBounds['arrow-' + idx];
    if (!b) return;
    const yVar = new Variable(`arrow_${idx}_y`);
    const hVar = new Variable(`arrow_${idx}_h`);
    arrowVars[idx] = { y: yVar, h: hVar };
    solver.addConstraint(new Constraint(yVar, Operator.Eq, b.y, Strength.strong));
    solver.addConstraint(new Constraint(hVar, Operator.Eq, b.h, Strength.strong));
    allElements.push({ key: idx, type: 'arrow', y: b.y, h: b.h, yVar, hVar });
  });

  // Sort by original Y position
  allElements.sort((a, b) => a.y - b.y);

  // Add ordering constraints: each element's top must be >= previous element's
  // top + previous element's height + gap. This is REQUIRED strength so the
  // solver will push things down when a node expands.
  for (let i = 1; i < allElements.length; i++) {
    const prev = allElements[i - 1];
    const curr = allElements[i];
    const origGap = curr.y - (prev.y + prev.h);
    const minGap = Math.max(GAP, origGap);
    // curr.y >= prev.y + prev.h + minGap
    const expr = new kiwi.Expression(prev.yVar, prev.hVar, minGap);
    solver.addConstraint(new Constraint(curr.yVar, Operator.Ge, expr, Strength.required));
  }

  solver.updateVariables();
}

function solveAndApply() {
  solver.updateVariables();

  svg.querySelectorAll('[data-node-id]').forEach(el => {
    const id = el.dataset.nodeId;
    const vars = nodeVars[id];
    const bounds = originalBounds[id];
    if (!vars || !bounds) return;
    const dy = vars.y.value() - bounds.y;
    el.style.transform = Math.abs(dy) > 0.5 ? `translate(0px, ${dy}px)` : '';
  });

  svg.querySelectorAll('[data-arrow]').forEach(el => {
    const idx = el.dataset.arrowIdx;
    const vars = arrowVars[idx];
    const bounds = originalBounds['arrow-' + idx];
    if (!vars || !bounds) return;
    const dy = vars.y.value() - bounds.y;
    el.style.transform = Math.abs(dy) > 0.5 ? `translate(0px, ${dy}px)` : '';
  });
}

function setNodeHeight(nodeId, newHeight) {
  const vars = nodeVars[nodeId];
  if (!vars) return;
  const { Constraint, Operator, Strength } = kiwi;

  // Remove old height constraint if we stored one
  if (heightEdits[nodeId]) {
    solver.removeConstraint(heightEdits[nodeId]);
  }
  // Add new height constraint at REQUIRED strength so ordering constraints propagate
  const c = new Constraint(vars.h, Operator.Eq, newHeight, Strength.required);
  solver.addConstraint(c);
  heightEdits[nodeId] = c;
}

function restoreNodeHeight(nodeId) {
  const bounds = originalBounds[nodeId];
  const vars = nodeVars[nodeId];
  if (!vars || !bounds) return;
  const { Constraint, Operator, Strength } = kiwi;

  if (heightEdits[nodeId]) {
    solver.removeConstraint(heightEdits[nodeId]);
    delete heightEdits[nodeId];
  }
  // Re-add original height at STRONG (not required) so it returns to default
  // Actually we need to re-assert original. The original STRONG constraint is
  // still there from buildSolver, so just removing the REQUIRED override
  // lets it snap back.
}

function fetchExpandedSVG(src) {
  if (!fetchCache[src]) {
    fetchCache[src] = fetch(src).then(r => r.text()).then(html => {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      return doc.querySelector('svg');
    });
  }
  return fetchCache[src].then(el => el ? el.cloneNode(true) : null);
}

async function expand(nodeId) {
  const node = svg.querySelector(`[data-node-id="${nodeId}"]`);
  if (!node || !node.dataset.expandable || expandedState[nodeId]) return;

  const expandW = parseFloat(node.dataset.expandW);
  const expandH = parseFloat(node.dataset.expandH);
  const eBounds = originalBounds[nodeId];

  expandedState[nodeId] = { expandW, expandH, bounds: eBounds };

  const innerSvg = await fetchExpandedSVG(node.dataset.expandSrc);
  if (!innerSvg) { delete expandedState[nodeId]; return; }

  const expandedG = node.querySelector('.expanded-content');
  const collapsedG = node.querySelector('.collapsed-content');

  const nested = document.createElementNS(NS, 'svg');
  nested.setAttribute('x', eBounds.x);
  nested.setAttribute('y', eBounds.y);
  nested.setAttribute('width', expandW);
  nested.setAttribute('height', expandH);
  nested.setAttribute('viewBox', innerSvg.getAttribute('viewBox'));
  while (innerSvg.firstChild) nested.appendChild(innerSvg.firstChild);
  expandedG.innerHTML = '';
  expandedG.appendChild(nested);

  collapsedG.classList.add('hidden');
  expandedG.classList.add('visible');

  // Tell the solver this node is now taller
  setNodeHeight(nodeId, expandH);
  solveAndApply();
}

function collapse(nodeId) {
  const node = svg.querySelector(`[data-node-id="${nodeId}"]`);
  if (!node || !expandedState[nodeId]) return;

  const expandedG = node.querySelector('.expanded-content');
  const collapsedG = node.querySelector('.collapsed-content');
  collapsedG.classList.remove('hidden');
  expandedG.classList.remove('visible');
  setTimeout(() => { expandedG.innerHTML = ''; }, 400);

  delete expandedState[nodeId];

  // Restore original height in solver
  restoreNodeHeight(nodeId);
  solveAndApply();
}

// Click handler for expandable nodes — uses event delegation
svg.addEventListener('click', (e) => {
  if (didPan) return; // was a pan gesture, not a click
  const expandable = e.target.closest('[data-expandable]');
  if (!expandable) return;
  // Don't expand if clicking a .clickable with a nav() handler inside
  if (e.target.closest('.clickable[onclick]')) return;
  const id = expandable.dataset.nodeId;
  if (expandedState[id]) collapse(id);
  else expand(id);
});

// Init: cache bounds, then build constraint solver
requestAnimationFrame(() => {
  cacheBounds();
  buildSolver();
});
</script>

</body>
