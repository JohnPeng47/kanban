<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Preemption Detail</title></head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 520"
  font-family="'JetBrains Mono','Fira Code','SF Mono','Consolas',monospace" font-size="11">
  <style>
    text { fill: #8B949E; }
    .white { fill: #E6EDF3; } .blue { fill: #4C9AFF; } .green { fill: #3FB950; }
    .orange { fill: #D29922; } .red { fill: #F85149; } .dim { fill: #6E7681; }
    .heading { font-size: 13px; font-weight: 600; } .subhead { font-size: 10px; }
  </style>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#8B949E" stroke-width="1"/>
    </marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#F85149" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="530" height="520" rx="4" fill="#24292E" stroke="#D29922" stroke-width="1.2"/>
  <text x="14" y="20" class="orange heading"
    data-tt="Scheduler.js:400 — Higher-priority work interrupts lower-priority">PREEMPTION</text>
  <text x="14" y="36" class="dim subhead">Higher-priority work can interrupt and replace lower-priority work.</text>
  <text x="14" y="50" class="dim subhead">Source: Scheduler.js (workLoop) · ReactFiberWorkLoop.js</text>

  <text x="14" y="72" class="white" font-size="10" font-weight="600">SCENARIO:</text>
  <text x="14" y="88" font-size="10"
    data-tt="NormalPriority — timeout 5000ms, sortIndex ~5100">1. Transition render in progress (NormalPriority)</text>
  <text x="14" y="103" font-size="10"
    data-tt="ImmediatePriority — timeout -1ms, sortIndex ~100">2. User clicks a button (SyncLane → ImmediatePriority)</text>

  <!-- Step 1 -->
  <rect x="40" y="118" width="220" height="44" rx="3" fill="#2D3339" stroke="#D29922" stroke-width="0.6"/>
  <text x="52" y="136" class="orange" font-size="10"
    data-tt="Scheduler.js:400 — workLoop processing transition task">Transition task</text>
  <text x="52" y="150" class="white" font-size="10">rendering fiber #437/~2000</text>
  <text x="270" y="135" class="dim" font-size="9">taskQueue:</text>
  <text x="270" y="149" class="dim" font-size="9">[transition (sortIdx=5100)]</text>

  <line x1="260" y1="142" x2="320" y2="142" stroke="#F85149" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="330" y="146" class="red" font-size="9" font-weight="600">USER CLICKS</text>

  <line x1="150" y1="162" x2="150" y2="186" stroke="#8B949E" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="40" y="190" width="220" height="34" rx="3" fill="#2D3339" stroke="#F85149" stroke-width="0.8"/>
  <text x="52" y="208" class="red" font-size="10" font-weight="600"
    data-tt="Scheduler.js:480 — Higher-priority task detected in heap">shouldYield() → true</text>
  <text x="52" y="220" class="dim" font-size="9">higher-pri task in heap</text>
  <text x="270" y="206" class="dim" font-size="9">taskQueue:</text>
  <text x="270" y="220" class="red" font-size="9">[click(100), transition(5100)]</text>

  <line x1="150" y1="224" x2="150" y2="248" stroke="#8B949E" stroke-width="1" marker-end="url(#arr)"/>
  <text x="160" y="242" class="dim subhead"
    data-tt="Scheduler.js:450 — Returns continuation, task stays in heap">returns continuation</text>

  <!-- Step 3 -->
  <rect x="40" y="252" width="220" height="34" rx="3" fill="#2D3339" stroke="#D29922" stroke-width="0.6"/>
  <text x="52" y="268" font-size="10"
    data-tt="Scheduler.js:450 — task.callback updated to continuation function">Transition continuation</text>
  <text x="52" y="280" class="dim" font-size="9">stays in heap at idx=5100</text>

  <line x1="150" y1="286" x2="150" y2="308" stroke="#8B949E" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 4: Click runs -->
  <rect x="40" y="312" width="220" height="44" rx="3" fill="#2D3339" stroke="#3FB950" stroke-width="1"/>
  <text x="52" y="330" class="green" font-size="10" font-weight="600"
    data-tt="SyncLane — runs to completion without yielding">Click render executes</text>
  <text x="52" y="344" class="white" font-size="10">runs to completion, commits</text>
  <text x="270" y="328" class="green" font-size="9">SyncLane: no yielding,</text>
  <text x="270" y="342" class="green" font-size="9">runs in one shot</text>

  <line x1="150" y1="356" x2="150" y2="378" stroke="#8B949E" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="40" y="382" width="220" height="44" rx="3" fill="#2D3339" stroke="#D29922" stroke-width="0.6"/>
  <text x="52" y="400" class="orange" font-size="10"
    data-tt="Scheduler.js:400 — workLoop resumes transition continuation">Transition resumes</text>
  <text x="52" y="414" font-size="10">picks up continuation</text>

  <line x1="150" y1="426" x2="150" y2="452" stroke="#F85149" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="160" y="440" class="red subhead"
    data-tt="ReactFiberWorkLoop.js — Click committed new state, WIP tree is stale">BUT: click changed state!</text>
  <text x="160" y="452" class="red subhead">WIP tree is stale</text>

  <!-- Step 6 -->
  <rect x="40" y="456" width="220" height="34" rx="3" fill="#2D3339" stroke="#F85149" stroke-width="1"/>
  <text x="52" y="474" class="red" font-size="10" font-weight="600"
    data-tt="ReactFiberWorkLoop.js — prepareFreshStack discards stale WIP tree">Reconciler restarts</text>
  <text x="52" y="486" class="white" font-size="10">prepareFreshStack()</text>
  <text x="270" y="474" class="dim" font-size="9">new WIP tree from scratch</text>

  <text x="14" y="510" class="red subhead" font-style="italic">Render must be side-effect-free — React can abandon a partially-built tree at any time.</text>
</svg>
</body>
</html>
