<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
<svg id="diagram" xmlns="http://www.w3.org/2000/svg"

       data-code-ref-id=""

    <line x1="30" y1="440" x2="1070" y2="440" stroke="#4C9AFF" stroke-width="1.2"/>
    <text x="30" y="460" class="heading blue">useDiagramViewer Hook [CUV]</text>
  </g>

  <!-- State box -->
  <g class="fade-section" style="animation-delay: 0.2s"
     data-reflow-group="EST" data-interactive="EST"
     data-ref="CST" data-category="hook-state" data-label="State" data-tt="useDiagramViewer state declarations"
     data-entity-name="State box" data-entity-kind="box" data-entity-desc="useDiagramViewer state declarations"
     data-code-ref-id="CST"
     data-source-span="28:2-41:36">
    <rect x="30" y="475" width="310" height="235" rx="6" ry="6" fill="#24292E" stroke="#4C9AFF" stroke-width="1.2"/>
    <text x="45" y="495" class="heading blue">State</text>
    <text x="320" y="495" class="dim subhead">EST</text>
    <text x="45" y="517">tree: FileTreeNode[]</text>
    <text x="45" y="533">diagramsRootExists: boolean</text>
    <text x="45" y="549">isTreeLoading: boolean</text>
    <text x="45" y="565">selectedPath: string | null</text>
    <text x="45" y="581">expandedFolders: Set&lt;string&gt;</text>
    <text x="45" y="597">content: string | null</text>
    <text x="45" y="613">isContentLoading: boolean</text>
    <text x="45" y="629">contentError: string | null</text>
    <text x="45" y="645">workspacePath: string | null</text>
    <text x="45" y="661" data-ref="CPJ" data-code-ref-id="CPJ">pendingJumpElementId [CPJ]</text>
    <text x="315" y="700" class="dim subhead">EST</text>
  </g>

  <!-- Effects box -->
  <g class="fade-section" style="animation-delay: 0.25s"
     data-reflow-group="EEF" data-interactive="EEF"
     data-ref="CEF" data-category="hook-effects" data-label="Effects" data-tt="useDiagramViewer effects (tree, content, URL sync)"
     data-entity-name="Effects box" data-entity-kind="box" data-entity-desc="useDiagramViewer effects (tree, content, URL sync)"
     data-code-ref-id="CEF"
     data-source-span="28:38-43:69">
    <rect x="380" y="475" width="690" height="235" rx="6" ry="6" fill="#24292E" stroke="#4C9AFF" stroke-width="1.2"/>
    <text x="395" y="495" class="heading blue">Effects</text>
    <text x="1050" y="495" class="dim subhead">EEF</text>

    <text x="395" y="520" class="white">1. Tree fetch (on mount / workspaceId change)</text>
    <text x="410" y="536">trpc.diagrams.list.query({})</text>
    <text x="410" y="552">→ setTree, setDiagramsRootExists</text>
    <text x="410" y="568">→ auto-expand top-level dirs</text>
    <text x="410" y="584">→ derive workspacePath from diagramsRoot</text>

    <text x="395" y="610" class="white">2. Content fetch (on selectedPath change)</text>
    <text x="410" y="626">trpc.diagrams.getContent.query({ path })</text>
    <text x="410" y="642">→ setContent or setContentError</text>

    <text x="395" y="668" class="white">3. URL sync (on selectedPath change)</text>
    <text x="410" y="684">history.replaceState → ?view=diagram&amp;path=...</text>
    <text x="1045" y="700" class="dim subhead">EEF</text>
  </g>

  <!-- Arrow: EST → EEF -->
  <line x1="340" y1="560" x2="380" y2="560"
        stroke="#4C9AFF" stroke-width="1" marker-end="url(#ab)"
        class="fade-section" style="animation-delay: 0.3s"
        data-arrow="EST-EEF" data-arrow-src="EST" data-arrow-target="EEF" data-arrow-desc="State drives effect triggers (selectedPath, workspaceId)"/>

  <!-- Arrow: EEF → EST -->
  <line x1="380" y1="590" x2="340" y2="590"
        stroke="#4C9AFF" stroke-width="1" marker-end="url(#ab)"
        class="fade-section" style="animation-delay: 0.35s"
        data-arrow="EEF-EST" data-arrow-src="EEF" data-arrow-target="EST" data-arrow-desc="Effects update state (setTree, setContent, etc.)"/>

  <!-- Callbacks box -->
  <g class="fade-section" style="animation-delay: 0.4s"

     data-ref="CCB" data-category="hook-callbacks" data-label="Callbacks" data-tt="useDiagramViewer callback definitions"
     data-entity-name="Callbacks box" data-entity-kind="box" data-entity-desc="useDiagramViewer callback definitions"
     data-code-ref-id="CCB"
     data-source-span="45:2-55:73">
    <rect x="30" y="730" width="1040" height="150" rx="6" ry="6" fill="#24292E" stroke="#4C9AFF" stroke-width="1.2"/>
    <text x="45" y="750" class="heading blue">Callbacks</text>
    <text x="1045" y="750" class="dim subhead">ECB</text>

    <text x="45" y="775">onSelectPath(path)</text>
    <text x="400" y="775" class="dim">— set selectedPath, triggers content fetch</text>

    <text x="45" y="795">onToggleFolder(path)</text>
    <text x="400" y="795" class="dim">— toggle folder in expandedFolders set</text>

    <text x="45" y="815" data-ref="CRJ" data-code-ref-id="CRJ">requestJump(path, elementId) [CRJ]</text>
    <text x="400" y="815" class="dim">— cross-diagram navigation:</text>
    <text x="415" y="831" class="dim">setPendingJumpElementId(elementId)</text>
    <text x="415" y="847" class="dim">setSelectedPath(path) → triggers content fetch</text>
    <text x="415" y="863" class="dim">history.pushState (enables browser back)</text>

    <text x="45" y="868" data-ref="CCJ" data-code-ref-id="CCJ">consumeJump() [CCJ]</text>
    <text x="400" y="868" class="dim">— clear pendingJumpElementId after scene animates</text>
  </g>

  <!-- Arrow: ECB → EST -->
  <line x1="190" y1="730" x2="190" y2="710"
        stroke="#4C9AFF" stroke-width="1" marker-end="url(#ab)"
        class="fade-section" style="animation-delay: 0.45s"
        data-arrow="ECB-EST" data-arrow-src="ECB" data-arrow-target="EST" data-arrow-desc="Callbacks mutate state (setSelectedPath, setPendingJumpElementId)"/>

  <!-- ═══ Jump Protocol Section ═══ -->
  <g class="fade-section" style="animation-delay: 0.5s"
     data-reflow-group="section-jump"
     data-source-span="58:0-58:97">
    <line x1="30" y1="910" x2="1070" y2="910" stroke="#D29922" stroke-width="1.2"/>
    <text x="30" y="930" class="heading orange">Jump Protocol</text>
  </g>

  <!-- Jump Protocol sequence diagram -->
  <g class="fade-section" style="animation-delay: 0.55s"
     data-reflow-group="EJP" data-interactive="EJP"
     data-entity-name="Jump Protocol" data-entity-kind="text" data-entity-desc="Sequence diagram: click → requestJump → fetch → animate → consumeJump"
     data-source-span="60:2-79:38">
    <rect x="30" y="940" width="1040" height="330" rx="6" ry="6" fill="#24292E" stroke="#D29922" stroke-width="1.2"/>

    <!-- Column headers -->
    <text x="55" y="965" class="white">[EJP] User clicks **-link</text>
    <text x="310" y="965" class="white">DiagramContentArea</text>
    <text x="560" y="965" class="white">useDiagramViewer</text>
    <text x="830" y="965" class="white">New Scene</text>
    <text x="55" y="980" class="dim">in current scene</text>
    <text x="310" y="980" class="dim">(navigation handler)</text>
    <text x="560" y="980" class="dim">(hook state)</text>
    <text x="830" y="980" class="dim">(after load)</text>

    <!-- Vertical lifelines -->
    <line x1="120" y1="990" x2="120" y2="1250" stroke="#30363D" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="380" y1="990" x2="380" y2="1250" stroke="#30363D" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="630" y1="990" x2="630" y2="1250" stroke="#30363D" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="880" y1="990" x2="880" y2="1250" stroke="#30363D" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Step: link target has path + elementId -->
    <text x="55" y="1010" class="dim">link target has</text>
    <text x="55" y="1024" class="dim">path + elementId</text>
    <line x1="140" y1="1010" x2="370" y2="1010" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>

    <!-- Step: onRequestJump -->
    <line x1="390" y1="1040" x2="620" y2="1040" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="400" y="1036" class="dim subhead">onRequestJump(p, eid)</text>

    <!-- Step: hook state updates -->
    <text x="640" y="1062">pendingJumpElementId</text>
    <text x="640" y="1078">selectedPath = p</text>
    <text x="640" y="1094">pushState(url)</text>

    <!-- Step: content fetch -->
    <line x1="640" y1="1110" x2="870" y2="1110" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="680" y="1106" class="dim subhead">content fetch</text>

    <!-- Step: scene mounts -->
    <text x="890" y="1140">scene mounts</text>
    <text x="890" y="1156">reads elementId</text>
    <text x="890" y="1172">animates to box</text>

    <!-- Step: consumeJump -->
    <line x1="870" y1="1195" x2="640" y2="1195" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="700" y="1191" class="dim subhead">onJumpConsumed()</text>
    <line x1="620" y1="1195" x2="390" y2="1195" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="430" y="1191" class="dim subhead">consumeJump()</text>

    <text x="640" y="1220">pendingJumpElementId</text>
    <text x="640" y="1236">= null</text>
  </g>

  <!-- ═══ useCodeVizStatus Hook Section ═══ -->
  <g class="fade-section" style="animation-delay: 0.6s"
     data-reflow-group="section-codeviz"
     data-source-span="81:0-81:97">
    <line x1="30" y1="1300" x2="1070" y2="1300" stroke="#4C9AFF" stroke-width="1.2"/>
    <text x="30" y="1320" class="heading blue">useCodeVizStatus Hook [CCS]</text>
  </g>

  <!-- useCodeVizStatus box -->
  <g class="fade-section" style="animation-delay: 0.65s"
     data-reflow-group="ECV" data-interactive="ECV"
     data-ref="CCS" data-category="hook" data-label="useCodeVizStatus" data-tt="30s polling hook driving CodeVizStatusIndicator badge"
     data-entity-name="useCodeVizStatus" data-entity-kind="box" data-entity-desc="30s polling hook driving CodeVizStatusIndicator badge"
     data-code-ref-id="CCS"
     data-source-span="83:2-94:72">
    <rect x="30" y="1335" width="730" height="160" rx="6" ry="6" fill="#24292E" stroke="#4C9AFF" stroke-width="1.2"/>
    <text x="45" y="1355" class="dim subhead">ECV</text>

    <text x="45" y="1375">Poll every 30s: trpc.diagrams.checkExtension.query()</text>

    <text x="45" y="1405" class="white">Server response:</text>
    <text x="400" y="1405" class="white">Hook state:</text>

    <text x="55" y="1425">available=false</text>
    <text x="310" y="1425">→</text>
    <text x="400" y="1425" class="red">"disconnected"</text>

    <text x="55" y="1445">available=true, registered=false</text>
    <text x="310" y="1445">→</text>
    <text x="400" y="1445" class="orange">"workspace-not-registered"</text>

    <text x="55" y="1465">available=true, registered=true</text>
    <text x="310" y="1465">→</text>
    <text x="400" y="1465" class="green">"connected"</text>

    <text x="45" y="1488" class="dim" data-ref="CCI" data-code-ref-id="CCI">Drives CodeVizStatusIndicator [CCI] badge color</text>
    <text x="735" y="1488" class="dim subhead">ECV</text>
  </g>

  <!-- Arrow: ECV → ECI -->
  <line x1="550" y1="1335" x2="550" y2="407" stroke="#8B949E" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"
        class="fade-section" style="animation-delay: 0.7s"
        data-arrow="ECV-ECI" data-arrow-src="ECV" data-arrow-target="ECI" data-arrow-desc="Hook state drives badge color/text"/>

</svg>
<script type="text/plain" id="ascii-source">
DIAGRAM VIEWER — COMPONENT + HOOK WIRING

═══ DiagramViewer 3-Panel Layout [CDV] ═══════════════════════════════════════════════════════════════════════

┌─ DiagramViewer ──────────────────────────────────────────────────────────────────────────────────────────────┐
│ EDV                                                                                                         │
│  ┌─ TreePanel [CTP] ────┐   ┌─ ContentArea [CCA] ──────────────────────────┐   ┌─ AgentPanel (optional) ───┐  │
│  │ ETP                   │   │ ECA                                         │   │ EAG                       │  │
│  │  FileTreeNode[]       │   │  DiagramContentArea                         │   │  useDiagramAgentPanel     │  │
│  │                       │   │    ** 05-scene-and-input.txt                  │   │    → ReactElement | null  │  │
│  │  selectedPath ●       │ R │    ** 06-scene-svgscene-detail.txt           │ R │                           │  │
│  │  expandedFolders      │ e │                                             │ e │  ClineAgent integration   │  │
│  │  onSelectPath()       │ s │  Props from useDiagramViewer:               │ s │                           │  │
│  │  onToggleFolder()     │ i │    content, isLoading, error                │ i │                           │  │
│  │                       │ z │    selectedPath, workspaceId                │ z │                           │  │
│  │  w: 250 (min 180)     │ e │    onRequestJump, pendingJumpElementId     │ e │  w: 420 (min 320)         │  │
│  │                   ETP │   │    onJumpConsumed                       ECA │   │                       EAG │  │
│  └─────────────────────────┘   └─────────────────────────────────────────────┘   └───────────────────────────┘  │
│       [ET1] drag ──►              content fills remainder              ◄── drag [ET2]                        │
│                                                                                                             │
│  [ECI] CodeVizStatusIndicator [CCI] — overlay badge top-right of content area                               │
│    state: connected | workspace-not-registered | disconnected                                               │
│                                                                                                         EDV │
└─────────────────────────────────────────────────────────────────────────────────────────────────────────────┘


═══ useDiagramViewer Hook [CUV] ══════════════════════════════════════════════════════════════════════════════

  ┌─ State ────────────────────────┐       ┌─ Effects ─────────────────────────────────────────────────────┐
  │ EST                            │       │ EEF                                                           │
  │  tree: FileTreeNode[]         │       │  1. Tree fetch (on mount / workspaceId change)                │
  │  diagramsRootExists: boolean  │       │     trpc.diagrams.list.query({})                              │
  │  isTreeLoading: boolean       │       │     → setTree, setDiagramsRootExists                         │
  │  selectedPath: string | null  │       │     → auto-expand top-level dirs                             │
  │  expandedFolders: Set<string> │       │     → derive workspacePath from diagramsRoot                 │
  │  content: string | null       │       │                                                               │
  │  isContentLoading: boolean    │       │  2. Content fetch (on selectedPath change)                    │
  │  contentError: string | null  │       │     trpc.diagrams.getContent.query({ path })                  │
  │  workspacePath: string | null │       │     → setContent or setContentError                          │
  │  pendingJumpElementId [CPJ]   │       │                                                               │
  │                           EST │       │  3. URL sync (on selectedPath change)                         │
  └────────────────────────────────┘       │     history.replaceState → ?view=diagram&path=...            │
                                           │                                                           EEF │
                                           └───────────────────────────────────────────────────────────────┘

  ┌─ Callbacks ────────────────────────────────────────────────────────────────────────────────────────────┐
  │ ECB                                                                                                    │
  │  onSelectPath(path)                  — set selectedPath, triggers content fetch                       │
  │  onToggleFolder(path)                — toggle folder in expandedFolders set                           │
  │  requestJump(path, elementId) [CRJ]  — cross-diagram navigation:                                     │
  │                                          setPendingJumpElementId(elementId)                           │
  │                                          setSelectedPath(path) → triggers content fetch               │
  │                                          history.pushState (enables browser back)                     │
  │  consumeJump() [CCJ]                — clear pendingJumpElementId after scene animates to target       │
  │                                                                                                   ECB │
  └───────────────────────────────────────────────────────────────────────────────────────────────────────┘

  [EJP] User clicks **-link          DiagramContentArea              useDiagramViewer              New Scene
  in current scene             (navigation handler)            (hook state)                  (after load)
       │                              │                              │                          │
       ├─ link target has ──────────► │                              │                          │

       │                              │                              ├─ selectedPath = p        │
       │                              │                              ├─ pushState(url)          │
       │                              │                              │                          │
       │                              │                              ├─ content fetch ─────────►│
       │                              │                              │                          │
       │                              │                              │         scene mounts ───►│
       │                              │                              │         reads elementId  │

       │                              │                              │                          │
