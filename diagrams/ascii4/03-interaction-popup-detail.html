<!DOCTYPE html>

  <style>

</head>
<body>

  <!-- Title                                                        -->
  <!-- ============================================================ -->

  <!-- Cross-reference to 02-rendering.txt -->

     data-entity-name="cross-refs"
     data-entity-kind="text"
     data-entity-desc="Cross-reference to 02-rendering.txt"
     data-link="02-rendering.html"
     data-link-target-file="02-rendering.txt"

     class="fade-section" style="animation-delay: 0.05s">
    <text x="20" y="72" class="blue">** 02-rendering.txt</text>

          </g>
          <g data-interactive="ESI.2" data-source-span="55:7-55:50" data-entity-parent="ESI">

        <g data-interactive="ECA"
           data-source-span="58:5-61:60"
           data-entity-parent="EPS"
           data-entity-name="capabilities"
           data-entity-kind="text"
           data-entity-desc="Popup capabilities: code jumps, nested popups, link following"
           data-link="03-interaction.html#EHN"
           data-link-target-file="03-interaction.txt"
           data-link-target-id="EHN"
           data-link-desc="clicks inside popup relay onNavigate / parent handleNavigate">
          <text x="100" y="808" class="white">This means a popup can:</text>

       data-entity-parent="EPO"
       data-entity-name="esc-handler"
       data-entity-kind="text"
       data-entity-desc="ESC key / onClose (window keydown listener)">
      <text x="56" y="870" class="white">ESC key &#x2192; onClose</text>
      <text x="225" y="870" class="dim">(window keydown listener)</text>
    </g>

  </g>
  <!-- end PopupDiagramOverlay -->

  <!-- ============================================================ -->
  <!-- Arrows: structural connections                               -->
  <!-- ============================================================ -->

  <!-- Arrow: onClose -> EDS (slices popup stack) -->
  <g data-arrow

     data-arrow-target="EDS"
     data-arrow-desc="onClose slices stack at index (closes this + above)"

    <path d="M1080,550 L1094,550 L1094,214 L1080,214" fill="none" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="1078" y="400" class="dim subhead" transform="rotate(-90,1078,400)">onClose &#x2192; slice stack</text>
  </g>

  <g data-arrow

     data-arrow-target="EPO"

     data-source-span="67:5-67:60"
     class="fade-section" style="animation-delay: 0.35s">
    <text x="428" y="870" class="dim subhead">&#x2192; triggers onClose (closes overlay)</text>
