<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Types &amp; Data Model</title>
  <style>
    body { margin: 0; padding: 0; background: #1F2428; overflow: hidden; height: 100vh; }
    svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
<svg id="diagram" xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 1500"
  font-family="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code','Consolas',monospace"
  font-size="11">

  <style>
    text { fill: #8B949E; }
    .white { fill: #E6EDF3; }
    .blue { fill: #4C9AFF; }
    .green { fill: #3FB950; }
    .violet { fill: #A371F7; }
    .orange { fill: #D29922; }
    .red { fill: #F85149; }
    .dim { fill: #6E7681; }
    .title { font-size: 14px; font-weight: 600; }
    .heading { font-size: 13px; font-weight: 600; }
    .subhead { font-size: 10px; }
    .flow-dash { stroke-dasharray: 6,4; animation: dash-flow 1.5s linear infinite; }
    @keyframes dash-flow { to { stroke-dashoffset: -20; } }
    .fade-section { opacity: 0; animation: fade-up 0.6s ease forwards; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#8B949E" stroke-width="1"/>
    </marker>
    <marker id="ab" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4C9AFF" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="-5000" y="-5000" width="11000" height="11000" fill="#1F2428"/>

  <!-- Title -->
  <g data-reflow-group="title" class="fade-section" style="animation-delay: 0s">
    <text x="20" y="28" class="white title">TYPES &amp; DATA MODEL</text>
    <text x="20" y="48" class="dim subhead">Core shapes that flow through the system</text>
  </g>

  <!-- Section: Geometry Primitives -->
  <g data-reflow-group="geometry-section" class="fade-section" style="animation-delay: 0.05s">
    <line x1="20" y1="70" x2="1160" y2="70" stroke="#444C56" stroke-width="1"/>
    <text x="20" y="90" class="white title">GEOMETRY PRIMITIVES</text>
  </g>

  <!-- Rect [RC] -->
  <g data-reflow-group="rect"
     data-interactive="RC"
     data-ref="web-ui/src/diagram/types.ts:4-9"
     data-category="type"
     data-label="Rect"
     data-link="02-rendering.html#SC"
     class="fade-section" style="animation-delay: 0.1s">
    <rect x="20" y="105" width="220" height="150" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="32" y="127" class="violet heading"
          data-tt="types.ts:4 — Rect interface">
      Rect [RC]
    </text>
    <text x="32" y="150" class="white">x: number</text>
    <text x="32" y="168" class="white">y: number</text>
    <text x="32" y="186" class="white">width: number</text>
    <text x="32" y="204" class="white">height: number</text>
  </g>

  <!-- Point [PT] -->
  <g data-reflow-group="point"
     data-interactive="PT"
     data-ref="web-ui/src/diagram/types.ts:12-15"
     data-category="type"
     data-label="Point"
     class="fade-section" style="animation-delay: 0.15s">
    <rect x="270" y="105" width="220" height="110" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="282" y="127" class="violet heading"
          data-tt="types.ts:12 — Point interface">
      Point [PT]
    </text>
    <text x="282" y="150" class="white">x: number</text>
    <text x="282" y="168" class="white">y: number</text>
  </g>

  <!-- Transform [TF] -->
  <g data-reflow-group="transform"
     data-interactive="TF"
     data-ref="web-ui/src/diagram/types.ts:18-22"
     data-category="type"
     data-label="Transform"
     data-link="02-rendering.html#TF"
     class="fade-section" style="animation-delay: 0.2s">
    <rect x="520" y="105" width="350" height="150" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="532" y="127" class="violet heading"
          data-tt="types.ts:18 — Transform interface">
      Transform [TF]
    </text>
    <text x="532" y="150" class="white">tx: number   <tspan class="dim">(translateX)</tspan></text>
    <text x="532" y="168" class="white">ty: number   <tspan class="dim">(translateY)</tspan></text>
    <text x="532" y="186" class="white">scale: number</text>
    <text x="532" y="210" class="dim subhead">IDENTITY = {0, 0, 1}</text>
  </g>

  <!-- Transform operations [CT] -->
  <g data-reflow-group="transform-ops"
     data-interactive="CT"
     data-ref="web-ui/src/diagram/types.ts:203-210"
     data-category="function"
     data-label="transformOps"
     data-link="02-rendering-svgscene-detail.html#WB"
     class="fade-section" style="animation-delay: 0.25s">
    <rect x="20" y="280" width="850" height="120" rx="4"
          fill="#24292E" stroke="#D29922" stroke-width="1"/>
    <text x="32" y="302" class="orange heading">Transform operations</text>

    <text x="40" y="325" class="white"
          data-tt="types.ts:203 — composeTransforms: combine parent+child transforms">
      composeTransforms(parent, child)  → combined transform [CT]
    </text>

    <g data-interactive="XR"
       data-ref="web-ui/src/diagram/types.ts:213-220"
       data-category="function"
       data-label="transformRect">
      <text x="40" y="345" class="white"
            data-tt="types.ts:213 — transformRect: apply transform to rect">
        transformRect(rect, transform)   → rect in new coordinate space [XR]
      </text>
    </g>

    <g data-interactive="RI"
       data-ref="web-ui/src/diagram/types.ts:189-191"
       data-category="function"
       data-label="rectsIntersect">
      <text x="40" y="365" class="white"
            data-tt="types.ts:189 — rectsIntersect: AABB overlap test">
        rectsIntersect(a, b)             → AABB overlap test [RI]
      </text>
    </g>

    <g data-interactive="RN"
       data-ref="web-ui/src/diagram/types.ts:194-201"
       data-category="function"
       data-label="rectContains">
      <text x="40" y="385" class="white"
            data-tt="types.ts:194 — rectContains: full containment test">
        rectContains(outer, inner)       → full containment test [RN]
      </text>
    </g>
  </g>

  <!-- Section: Interactive Metadata -->
  <g data-reflow-group="interactive-section" class="fade-section" style="animation-delay: 0.3s">
    <line x1="20" y1="430" x2="1160" y2="430" stroke="#444C56" stroke-width="1"/>
    <text x="20" y="450" class="white title">INTERACTIVE METADATA</text>
  </g>

  <!-- SVG data-* attributes → InteractiveData -->
  <g data-reflow-group="data-attrs" class="fade-section" style="animation-delay: 0.35s">
    <text x="20" y="478" class="dim heading">SVG data-* attributes</text>
    <text x="500" y="478" class="dim heading">Parsed structures</text>

    <!-- Left side: raw attributes -->
    <text x="30" y="500" class="dim subhead">data-interactive="myFunc"</text>
    <text x="30" y="515" class="dim subhead">data-ref="src/foo.ts:10-50"</text>
    <text x="30" y="530" class="dim subhead">data-category="function"</text>
    <text x="30" y="545" class="dim subhead">data-label="myFunc"</text>
    <text x="30" y="560" class="dim subhead">data-tt="src/foo.ts — helper"</text>
    <text x="30" y="575" class="dim subhead">data-nav="src/bar.ts:5"</text>
    <text x="30" y="590" class="dim subhead">data-modal="detail.html"</text>
    <text x="30" y="605" class="dim subhead">data-modal-position="right"</text>
    <text x="30" y="620" class="dim subhead">data-link="other.html#elem"</text>
  </g>

  <!-- Arrow: attrs → InteractiveData -->
  <g data-arrow class="fade-section" style="animation-delay: 0.4s">
    <line x1="290" y1="555" x2="430" y2="555" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="320" y="545" class="dim subhead">parsed into</text>
  </g>

  <!-- InteractiveData [ID] -->
  <g data-reflow-group="interactive-data"
     data-interactive="ID"
     data-ref="web-ui/src/diagram/types.ts:55-64"
     data-category="type"
     data-label="InteractiveData"
     data-link="03-interaction.html#HN"
     class="fade-section" style="animation-delay: 0.45s">
    <rect x="440" y="490" width="500" height="200" rx="4"
          fill="#24292E" stroke="#4C9AFF" stroke-width="1"/>
    <text x="452" y="512" class="blue heading"
          data-tt="types.ts:55 — InteractiveData interface">
      InteractiveData [ID]
    </text>
    <text x="460" y="538" class="white">ref: "src/foo.ts:10-50"</text>
    <text x="460" y="556" class="white">parsedRef: ParsedRef</text>
    <text x="460" y="574" class="white">category: "function"</text>
    <text x="460" y="592" class="white">label: "myFunc"</text>
    <text x="460" y="610" class="white">tooltip: "src/foo.ts — helper"</text>
    <text x="460" y="628" class="white">navTarget: ParsedRef (nav or ref)</text>
    <text x="460" y="646" class="white">modal: DiagramModal | null</text>
    <text x="460" y="664" class="white">link: DiagramLink | null</text>
  </g>

  <!-- Arrow: ID.parsedRef → ParsedRef -->
  <g data-arrow class="fade-section" style="animation-delay: 0.5s">
    <line x1="690" y1="695" x2="690" y2="730" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
  </g>

  <!-- ParsedRef [PR] -->
  <g data-reflow-group="parsed-ref"
     data-interactive="PR"
     data-ref="web-ui/src/diagram/types.ts:72-76"
     data-category="type"
     data-label="ParsedRef"
     class="fade-section" style="animation-delay: 0.5s">
    <rect x="20" y="735" width="320" height="110" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="32" y="757" class="violet heading"
          data-tt="types.ts:72 — ParsedRef interface">
      ParsedRef [PR]
    </text>
    <text x="40" y="780" class="white">filePath: string</text>
    <text x="40" y="798" class="white">startLine: number</text>
    <text x="40" y="816" class="white">endLine: number | null</text>
  </g>

  <!-- InteractiveCategory [IC] -->
  <g data-reflow-group="interactive-category"
     data-interactive="IC"
     data-ref="web-ui/src/diagram/types.ts:26"
     data-category="type"
     data-label="InteractiveCategory"
     class="fade-section" style="animation-delay: 0.55s">
    <rect x="370" y="735" width="450" height="110" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="382" y="757" class="violet heading"
          data-tt="types.ts:26 — InteractiveCategory union type">
      InteractiveCategory [IC]
    </text>
    <text x="390" y="780" class="white">"module" | "function" | "type"</text>
    <text x="390" y="798" class="white">"data"   | "flow"     | "call"</text>
    <text x="390" y="816" class="white">"concept" | "annotation"</text>
  </g>

  <!-- Section: Navigation Targets -->
  <g data-reflow-group="nav-section" class="fade-section" style="animation-delay: 0.6s">
    <line x1="20" y1="875" x2="1160" y2="875" stroke="#444C56" stroke-width="1"/>
    <text x="20" y="895" class="white title">NAVIGATION TARGETS</text>
  </g>

  <!-- Arrow: ID.modal → DiagramModal -->
  <g data-arrow class="fade-section" style="animation-delay: 0.62s">
    <line x1="580" y1="695" x2="200" y2="920" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="350" y="810" class="dim subhead">modal</text>
  </g>

  <!-- Arrow: ID.link → DiagramLink -->
  <g data-arrow class="fade-section" style="animation-delay: 0.63s">
    <line x1="800" y1="695" x2="850" y2="920" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
    <text x="830" y="810" class="dim subhead">link</text>
  </g>

  <!-- DiagramModal [DM] -->
  <g data-reflow-group="diagram-modal"
     data-interactive="DM"
     data-ref="web-ui/src/diagram/types.ts:31-40"
     data-category="type"
     data-label="DiagramModal"
     data-link="03-interaction.html#OP"
     class="fade-section" style="animation-delay: 0.65s">
    <rect x="20" y="920" width="530" height="210" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="32" y="942" class="violet heading"
          data-tt="types.ts:31 — DiagramModal interface">
      DiagramModal [DM]
    </text>
    <text x="40" y="968" class="dim subhead">source:</text>
    <text x="60" y="988" class="white">elementId: string</text>
    <text x="60" y="1006" class="white">ref: string | null</text>
    <text x="40" y="1030" class="dim subhead">target:</text>
    <text x="60" y="1050" class="white">path: string <tspan class="dim">(relative to diagram dir)</tspan></text>
    <text x="60" y="1068" class="white">position: OverlayPosition</text>
    <text x="70" y="1088" class="dim subhead">"above-left" | "above-right"</text>
    <text x="70" y="1103" class="dim subhead">"below-left" | "below-right"</text>
    <text x="70" y="1118" class="dim subhead">"left" | "right" | "auto"</text>
  </g>

  <!-- DiagramLink [DK] -->
  <g data-reflow-group="diagram-link"
     data-interactive="DK"
     data-ref="web-ui/src/diagram/types.ts:43-52"
     data-category="type"
     data-label="DiagramLink"
     data-link="03-interaction.html#EJ"
     class="fade-section" style="animation-delay: 0.7s">
    <rect x="580" y="920" width="530" height="180" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="592" y="942" class="violet heading"
          data-tt="types.ts:43 — DiagramLink interface">
      DiagramLink [DK]
    </text>
    <text x="600" y="968" class="dim subhead">source:</text>
    <text x="620" y="988" class="white">elementId: string</text>
    <text x="620" y="1006" class="white">ref: string | null</text>
    <text x="600" y="1030" class="dim subhead">target:</text>
    <text x="620" y="1050" class="white">path: string</text>
    <text x="620" y="1068" class="white">elementId: string | null</text>
    <text x="600" y="1092" class="dim subhead">Parsed from: "path.html#elementId" or just: "path.html"</text>
  </g>

  <!-- Section: Overlay Badges -->
  <g data-reflow-group="badges-section" class="fade-section" style="animation-delay: 0.75s">
    <line x1="20" y1="1140" x2="1160" y2="1140" stroke="#444C56" stroke-width="1"/>
    <text x="20" y="1160" class="white title">OVERLAY BADGES</text>
  </g>

  <!-- OverlayBadge [OB] -->
  <g data-reflow-group="overlay-badge"
     data-interactive="OB"
     data-ref="web-ui/src/diagram/types.ts:176-186"
     data-category="type"
     data-label="OverlayBadge"
     data-link="02-rendering.html#OL"
     class="fade-section" style="animation-delay: 0.8s">
    <rect x="20" y="1175" width="850" height="120" rx="4"
          fill="#24292E" stroke="#D29922" stroke-width="1"/>
    <text x="32" y="1197" class="orange heading"
          data-tt="types.ts:176 — OverlayBadge interface">
      OverlayBadge [OB]
    </text>
    <text x="40" y="1220" class="white">id: string</text>
    <text x="40" y="1238" class="white">anchor: BadgeAnchor</text>
    <text x="40" y="1256" class="white">text: string <tspan class="dim">(emoji or symbol, e.g. "⬡", "→")</tspan></text>
    <text x="40" y="1274" class="white">onClick: () =&gt; void</text>
    <text x="400" y="1220" class="white">style?: { color, background, borderColor }</text>
  </g>

  <!-- Arrow: OB.anchor → BadgeAnchor -->
  <g data-arrow class="fade-section" style="animation-delay: 0.85s">
    <line x1="200" y1="1300" x2="200" y2="1330" stroke="#8B949E" stroke-width="1" marker-end="url(#a)"/>
  </g>

  <!-- BadgeAnchor [BA] -->
  <g data-reflow-group="badge-anchor"
     data-interactive="BA"
     data-ref="web-ui/src/diagram/types.ts:166-173"
     data-category="type"
     data-label="BadgeAnchor"
     data-link="02-rendering.html#BA"
     class="fade-section" style="animation-delay: 0.9s">
    <rect x="20" y="1335" width="850" height="130" rx="4"
          fill="#24292E" stroke="#A371F7" stroke-width="1"/>
    <text x="32" y="1357" class="violet heading"
          data-tt="types.ts:166 — BadgeAnchor discriminated union">
      BadgeAnchor (discriminated union) [BA]
    </text>

    <!-- Table-like layout -->
    <line x1="240" y1="1370" x2="240" y2="1455" stroke="#444C56" stroke-width="0.5"/>

    <text x="40" y="1390" class="white">{ space: "screen" }</text>
    <text x="260" y="1390" class="dim subhead">Fixed screen position. x, y in pixels.</text>

    <line x1="30" y1="1400" x2="860" y2="1400" stroke="#444C56" stroke-width="0.3"/>

    <text x="40" y="1420" class="white">{ space: "scene" }</text>
    <text x="260" y="1420" class="dim subhead">Tracks with pan/zoom. x, y in scene coords.</text>

    <line x1="30" y1="1430" x2="860" y2="1430" stroke="#444C56" stroke-width="0.3"/>

    <text x="40" y="1450" class="white">{ space: "element" }</text>
    <text x="260" y="1450" class="dim subhead">Attached to element corner. elementId + corner (center, top-right, etc.)</text>
  </g>

</svg>
</body>
</html>
