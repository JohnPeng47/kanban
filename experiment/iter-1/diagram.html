      filter: brightness(1.3) drop-shadow(0 0 8px rgba(210, 153, 34, 0.4));

    [data-reflow-group], [data-arrow] {
      transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);

    <text x="600" y="115" text-anchor="middle" class="dim subhead">JS execution · style calc · layout · paint · input · rAF — all compete for one thread. Scheduler has no OS preemption: only cooperative yield.</text>
  </g>

  <!-- Arrow + problem statement -->
  <g data-arrow class="fade-section" style="animation-delay: 0.1s">

    </g>

    <text x="732" y="188" class="dim subhead">|&lt;5&gt;|&lt;b&gt;|&lt;5&gt;|&lt;b&gt;|...|&lt;5&gt;|&lt;done&gt;|  (with)</text>
    <text x="732" y="202" class="red tiny" font-style="italic">No true preemption — cooperative yield + heap re-root between macrotasks.</text>
  </g>

    <text x="32" y="1888" class="green subhead">LANE → EVENT PRIORITY → SCHEDULER PRIORITY</text>

    <text x="260" y="1918" class="violet tiny">→ UserBlockingSchedulerPriority  (250ms)</text>
    <text x="32" y="1932" class="white tiny">DefaultLane / DefaultEventPriority</text>
    <text x="260" y="1932" class="violet tiny">→ NormalSchedulerPriority  (5000ms)</text>
    <text x="32" y="1946" class="white tiny">IdleLane / IdleEventPriority</text>
    <text x="260" y="1946" class="violet tiny">→ IdleSchedulerPriority  (~12.43 days)</text>

    <text x="520" y="2005" class="white tiny">  return performWorkOnRootViaSchedulerTask.bind(null, root); // L603</text>

    <text x="32" y="1969" class="orange tiny">workLoopConcurrentByScheduler (ReactFiberWorkLoop.js:3051):</text>
